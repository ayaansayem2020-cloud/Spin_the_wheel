<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terms of Agreement</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none;
        }

        #nameScreen, #screen1, #screen2, #finalScreen {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            z-index: 10;
            width: 380px;
        }

        .cursive-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2rem;
            color: #2c3e50;
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 12px;
            width: 80%;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1.1rem;
            margin-bottom: 20px;
            outline: none;
        }

        .counter-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .count-box { padding: 10px; border-radius: 10px; min-width: 80px; }
        .yes-count { background: #e8f8f0; color: #2ecc71; border: 2px solid #2ecc71; }
        .no-count { background: #fdf2f2; color: #e74c3c; border: 2px solid #e74c3c; }

        button {
            padding: 15px 45px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover:not(:disabled) { background-color: #2980b9; transform: translateY(-2px); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .wheel-container { position: relative; width: 320px; height: 320px; margin: 60px auto 30px; cursor: grab; }
        
        .pointer {
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 30px solid transparent; border-right: 30px solid transparent; 
            border-top: 55px solid #e74c3c;
            filter: drop-shadow(0 0 8px rgba(231, 76, 60, 0.8));
            z-index: 30; animation: pulse 1s infinite alternate;
        }

        @keyframes pulse { from { transform: translateX(-50%) translateY(0); } to { transform: translateX(-50%) translateY(5px); } }

        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 10px solid #333;
            position: relative; overflow: hidden;
            transition: transform 2s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .half {
            position: absolute; width: 100%; height: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 2.5rem; color: white;
        }

        .yes { background-color: #2ecc71; top: 0; }
        .no { background-color: #e74c3c; bottom: 0; transform: rotate(180deg); }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            background-color: #f1c40f; top: -10%;
            animation: fall 3s linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="nameScreen">
        <div class="cursive-text">Welcome</div>
        <p>Enter name to start:</p>
        <input type="text" id="userName" placeholder="Your Name...">
        <br>
        <button onclick="saveName()">Next</button>
    </div>

    <div id="screen1" class="hidden">
        <div class="cursive-text">Do you agree, <span id="displayName"></span>?</div>
        <button onclick="showWheel()">Continue</button>
    </div>

    <div id="screen2" class="hidden">
        <div class="counter-container">
            <div class="count-box yes-count">Yes: <span id="yesVal">0</span></div>
            <div class="count-box no-count">No: <span id="noVal">0</span></div>
        </div>
        <div class="wheel-container" id="swipeArea">
            <div class="pointer"></div>
            <div id="wheel">
                <div class="half yes">YES</div>
                <div class="half no">NO</div>
            </div>
        </div>
        <h3 id="status">Swipe down to spin!</h3>
        <button id="spinBtn" onclick="spinWheel()">Or Click Spin</button>
    </div>

    <div id="finalScreen" class="hidden">
        <h1 style="color: #2ecc71;">Done!</h1>
        <p>User <strong><span id="finalName"></span></strong> reached 3 Yeses!</p>
        <div class="cursive-text" style="font-size: 2rem;">Data Logged.</div>
        <p style="color: #7f8c8d; font-size: 0.9rem;">Reload to try again.</p>
    </div>

    <script>
        let currentRotation = 0;
        let yesCount = 0;
        let noCount = 0;
        let isSpinning = false;
        let userName = "";

        // RANDOMIZED PATTERN: 3 Yes, 2 No, shuffled
        let outcomes = ["YES", "YES", "YES", "NO", "NO"].sort(() => Math.random() - 0.5);
        let currentOutcomeIndex = 0;

        // Swipe Detection
        let touchStartY = 0;
        const swipeArea = document.getElementById('swipeArea');
        swipeArea.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY);
        swipeArea.addEventListener('touchend', (e) => {
            if (e.changedTouches[0].clientY > touchStartY + 50) spinWheel();
        });

        function saveName() {
            userName = document.getElementById('userName').value;
            if (!userName.trim()) { alert("Please enter a name!"); return; }
            document.getElementById('nameScreen').style.display = "none";
            document.getElementById('displayName').innerText = userName;
            document.getElementById('screen1').classList.remove('hidden');
        }
        
        function showWheel() {
            document.getElementById('screen1').style.display = "none";
            document.getElementById('screen2').classList.remove('hidden');
        }

        function sendToDiscord() {
            const webhookURL = "https://discord.com/api/webhooks/1482741275189968947/_zs37xwYSeLefMORr_cHmbKlIsfVx-5DRtv41uFSIoXtuXUQBuRyTrYVoMhGcXREIHIW";
            const payload = { content: `✅ **Goal Reached!**\n**User:** ${userName}\n**Pattern used:** ${outcomes.join(', ')}` };
            fetch(webhookURL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }).catch(() => {});
        }

        function createConfetti() {
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#f1c40f','#e67e22','#e74c3c','#3498db','#9b59b6'][Math.floor(Math.random()*5)];
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function spinWheel() {
            if (isSpinning || currentOutcomeIndex >= outcomes.length) return;
            
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spinBtn');
            const status = document.getElementById('status');
            
            isSpinning = true;
            btn.disabled = true;
            status.innerText = "Spinning...";

            let result = outcomes[currentOutcomeIndex];
            let rotationStep = 3600; // 10 fast spins
            
            // Logic to determine final angle
            if (result === "NO") {
                // If it's already at YES (360n), add 180 to hit NO
                // If it was at NO, add 360 to stay at NO
                if (currentRotation % 360 === 0) currentRotation += (rotationStep + 180);
                else currentRotation += rotationStep;
            } else {
                // If it's at NO, add 180 to hit YES
                if (currentRotation % 360 !== 0) currentRotation += (rotationStep + 180);
                else currentRotation += rotationStep;
            }

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                if (result === "YES") {
                    yesCount++;
                    document.getElementById('yesVal').innerText = yesCount;
                    status.innerText = "YES! 🎉";
                    createConfetti();
                } else {
                    noCount++;
                    document.getElementById('noVal').innerText = noCount;
                    status.innerText = "NO... close one!";
                }

                currentOutcomeIndex++;

                if (yesCount >= 3) {
                    sendToDiscord();
                    setTimeout(() => {
                        document.getElementById('finalName').innerText = userName;
                        document.getElementById('screen2').classList.add('hidden');
                        document.getElementById('finalScreen').classList.remove('hidden');
                    }, 1200);
                } else {
                    isSpinning = false;
                    btn.disabled = false;
                    status.innerText = "Try again!";
                }
            }, 2000);
        }
    </script>
</body>
</html>

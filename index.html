<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Agreement - Final</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap');

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }

        #screen1, #screen2 {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 350px;
        }

        .cursive-text {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover:not(:disabled) { background-color: #2980b9; transform: scale(1.05); }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        .wheel-container { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin: 40px auto; 
        }
        
        /* THE ARROW */
        .pointer {
            position: absolute; 
            top: -35px; 
            left: 50%; 
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent;
            border-right: 20px solid transparent; 
            border-top: 40px solid #e74c3c; /* Red Arrow */
            filter: drop-shadow(0 0 5px rgba(231, 76, 60, 0.6));
            z-index: 30;
        }

        #wheel {
            width: 100%; height: 100%; border-radius: 50%; border: 8px solid #333;
            position: relative; overflow: hidden;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            transform: rotate(0deg);
        }

        .half {
            position: absolute; width: 100%; height: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 2rem; color: white;
        }

        .yes { background-color: #2ecc71; top: 0; }
        .no { 
            background-color: #e74c3c; 
            bottom: 0; 
            transform: rotate(180deg); /* Flips "NO" so it is readable at the top */
        }

        .confetti {
            position: absolute; width: 10px; height: 10px;
            background-color: #f1c40f; top: -10%;
            animation: fall 3s linear forwards;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="screen1">
        <div class="cursive-text">Do you agree to terms?</div>
        <button onclick="showWheel()">Continue</button>
    </div>

    <div id="screen2" class="hidden">
        <div class="pointer"></div>
        <div id="arrow-label" style="position: absolute; top: -60px; left: 50%; transform: translateX(-50%); font-weight: bold; color: #e74c3c;">TARGET</div>
        <div class="wheel-container">
            <div id="wheel">
                <div class="half yes">YES</div>
                <div class="half no">NO</div>
            </div>
        </div>
        <h3 id="status">Spin for your destiny!</h3>
        <button id="spinBtn" onclick="spinWheel()">Spin Wheel</button>
    </div>

    <script>
        let round = 1;
        let currentRotation = 0;
        
        function showWheel() {
            document.getElementById('screen1').style.display = 'none';
            document.getElementById('screen2').classList.remove('hidden');
        }

        function createConfetti() {
            for(let i=0; i<60; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = ['#f1c40f','#e67e22','#e74c3c','#3498db','#9b59b6'][Math.floor(Math.random()*5)];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 3000);
            }
        }

        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spinBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            status.innerText = "Spinning...";

            // Logic reset: 
            // 0 degrees = YES is at top
            // 180 degrees = NO is at top
            
            let rotationStep = 1800; // 5 full spins
            
            if (round === 1) {
                currentRotation += rotationStep; // Lands on YES (0 mod 360)
            } else if (round === 2) {
                currentRotation += (rotationStep + 180); // Lands on NO
            } else if (round === 3) {
                currentRotation += (rotationStep + 180); // Moves from NO back to YES
            } else {
                currentRotation += rotationStep; // Stay on YES
            }

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                btn.disabled = false;
                // Check if current position is a multiple of 360 (YES) or has 180 extra (NO)
                const isNo = (currentRotation / 180) % 2 !== 0;

                if (!isNo) {
                    status.innerText = "YES! 🎉";
                    createConfetti();
                } else {
                    status.innerText = "NO... try again!";
                }

                if (round >= 4) {
                    status.innerText = "Final Decision: AGREED!";
                    btn.innerText = "Accepted";
                    btn.onclick = null;
                }
                round++;
            }, 4000);
        }
    </script>
</body>
</html>
